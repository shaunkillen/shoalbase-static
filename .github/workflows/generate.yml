name: Regenerate ShoalBase static site

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr
            any::readr
            any::lubridate
            any::tidyr
            any::rlang
            any::countrycode
            any::memoise
            any::jsonlite
            any::rfishbase
            any::htmltools

      - name: Run generator
        run: Rscript generate.R

      - name: Commit regenerated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --quiet --cached || git commit -m "Auto-regenerate static site [skip ci]"
          git push
