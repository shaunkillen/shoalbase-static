name: Regenerate ShoalBase static site

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC every day
  workflow_dispatch:      # also allow manual runs from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Install R packages
        run: |
          install.packages(c(
            "dplyr","readr","lubridate","tidyr","rlang",
            "countrycode","memoise","jsonlite","rfishbase","htmltools"
          ), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Run generator
        run: Rscript generate.R

      - name: Commit regenerated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --quiet --cached || git commit -m "Auto-regenerate static site [skip ci]"
          git push
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --quiet --cached || git commit -m "Auto-regenerate static site [skip ci]"
          git push
